# ============================================================================
# Defense Test Config — Fast Convergence (200ep, target 90%+ acc)
# ============================================================================
# Problem: 200ep cosine decays LR too early → acc caps at 87%.
#
# Three changes to accelerate convergence WITHOUT touching attack params:
#   1. lr_method: step [120,170] — keeps LR=0.08 for 120 full epochs
#      (cosine was already at 0.019 by ep100)
#   2. lr: 0.06→0.08 — higher base LR for faster feature learning
#   3. retrain_times: 2→3 — each client trains 50% more per round
#
# These only affect convergence speed. Attack mechanism is unchanged:
#   same FSA, LWMP, norm_projection, bkd_ratio, separation_weight.
#
# Expected: Acc ~90-91%, ASR ~99%+, same wall time as 200ep cosine.
# ============================================================================

dataset: 'cifar10'
seed: 42
epochs: 200
poison_start_epoch: 0
poison_stop_epoch: 200
poison_epochs: 200

# ============= FL — identical to v4 =============
num_total_participants: 100
num_sampled_participants: 10
num_adversaries: 4
num_malicious_per_round: 2
sample_method: 'random'
dirichlet_alpha: 0.9

# ============= Training — convergence optimised =============
lr: 0.08                           # ★ 0.06→0.08 (faster feature learning)
target_lr: 0.08
lr_method: 'step'                  # ★ cosine→step (keeps LR high for 120ep)
lr_decay_epochs: [120, 170]        # ★ decay at ep120 and ep170
lr_decay_factor: 0.1               # ★ 10x reduction each step
momentum: 0.9
decay: 0.0005
batch_size: 64
test_batch_size: 1024
retrain_times: 3                   # ★ 2→3 (50% more local training per round)
attacker_retrain_times: 3

# ============= Aggregation =============
agg_method: 'avg'
clip_factor: 1

# ============= Factorised Trigger — identical to v4 =============
attacker_method: 'factorized'
k_of_m_k: 2
k_of_m_m: 3
initial_intensity: 0.15
final_intensity: 0.55
task_separation_weight: 0.40
rotation_strategy: 'adversary_specific'
rotation_frequency: 1
target_class: 2
bkd_ratio: 0.20

# ============= Enhanced Attack (FSA + LWMP) — identical to v4 =============
lambda_align: 0.3
lambda_align_start: 0.0
fsa_warmup_epochs: 80
fsa_distance: 'cosine'
fsa_momentum: 0.9
fsa_feature_layer: null

lambda_poison: 0.0
lwmp_strategy: 'auto'
lwmp_top_k_ratio: 0.4
lwmp_critical_scale: 1.2
lwmp_noncritical_scale: 0.7
lwmp_max_l2_ratio: 1.5

norm_projection: true
target_l2_ratio: 1.0
adaptive_separation: true
sep_asr_low: 0.70
sep_asr_high: 0.90

# ============= Defense parameters =============
krum_num_selected: 5
trimmed_mean_beta: 0.1
clip_threshold: 10.0
dp_noise_scale: 0.001

# ============= Evaluation =============
eval_freq: 10

# ============= Output =============
environment_name: 'defense_test_v4_fast'
save_model: false
save_on_epochs: []
results_dir: './results/defense_test_v4_fast'

visualization:
  enabled: false